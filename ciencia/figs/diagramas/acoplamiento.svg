<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 420" width="820" height="420" role="img" aria-label="Agencia inmanente y acoplamiento estructural: quien habita no programa la ciudad desde afuera (modelo soberano, descartado); la perturba desde dentro. La perturbación gatilla el cambio, pero la estructura interna —presupuestos y geometría— determina cuál cambio es viable. La perturbación gatilla, no especifica.">
  <defs>
    <marker id="cp-grey" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#a99f92"/>
    </marker>
    <marker id="cp-amber" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#b25a24"/>
    </marker>
  </defs>

  <!-- card -->
  <rect x="1.5" y="1.5" width="817" height="417" rx="18" fill="#faf7f2" stroke="#e7ddcf" stroke-width="1.5"/>
  <line x1="286" y1="78" x2="286" y2="352" stroke="#e6dccc" stroke-width="1" stroke-dasharray="2 5"/>

  <!-- ============ LEFT · SOBERANO (descartado) ============ -->
  <text x="155" y="46" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="17" font-weight="700" fill="#8a8178" letter-spacing="0.04em" text-decoration="line-through">SOBERANO</text>
  <text x="155" y="64" text-anchor="middle" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="9.5" fill="#a99f92">programa la ciudad desde afuera</text>

  <!-- external actor dictates a fully-specified city -->
  <text x="66" y="152" text-anchor="middle" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="9" fill="#a99f92">afuera</text>
  <circle cx="66" cy="176" r="6" fill="#ded5c7"/>
  <path d="M74,176 L150,176" fill="none" stroke="#a99f92" stroke-width="1.4" marker-end="url(#cp-grey)"/>
  <text x="112" y="168" text-anchor="middle" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="9" fill="#a99f92">programa</text>
  <rect x="156" y="150" width="86" height="52" rx="8" fill="#ded5c7"/>
  <text x="199" y="180" text-anchor="middle" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="10" fill="#8f8578">la ciudad</text>
  <!-- struck out: rejected -->
  <line x1="46" y1="210" x2="252" y2="140" stroke="#a99f92" stroke-width="2.6" stroke-linecap="round"/>

  <text x="155" y="246" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="11" font-style="italic" fill="#8a8178">el cambio no se dicta desde afuera</text>

  <!-- ============ RIGHT · INMANENTE ============ -->
  <text x="541" y="46" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="17" font-weight="700" fill="#b25a24" letter-spacing="0.04em">INMANENTE</text>
  <text x="541" y="64" text-anchor="middle" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="9.5" fill="#8a8178">acoplamiento estructural · perturba desde dentro</text>

  <!-- system boundary -->
  <rect x="322" y="86" width="452" height="150" rx="16" fill="none" stroke="#c98a5c" stroke-width="1.4"/>
  <text x="336" y="104" text-anchor="start" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="9" fill="#a99f92">el sistema · la ciudad</text>

  <!-- dweller inside perturbs -->
  <circle cx="364" cy="170" r="5.5" fill="#b25a24"/>
  <text x="364" y="194" text-anchor="middle" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="10" fill="#3a352f">quien habita</text>

  <!-- perturbation = amber spark entering the structure -->
  <polyline points="372,168 400,157 422,180 448,159 476,169" fill="none" stroke="#b25a24" stroke-width="1.8" marker-end="url(#cp-amber)"/>
  <text x="424" y="145" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="10.5" font-style="italic" fill="#b25a24">perturbación</text>

  <!-- internal structure: the gate that decides viability -->
  <rect x="478" y="150" width="98" height="40" rx="9" fill="#b25a24"/>
  <text x="527" y="174" text-anchor="middle" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="10" font-weight="700" fill="#fdf7f0">estructura</text>
  <text x="527" y="208" text-anchor="middle" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="8.5" fill="#a99f92">presupuestos · geometría</text>

  <!-- structure selects which change is viable -->
  <path d="M576,164 L666,126" fill="none" stroke="#a99f92" stroke-width="1.2" marker-end="url(#cp-grey)"/>
  <path d="M576,170 L666,170" fill="none" stroke="#b25a24" stroke-width="1.7" marker-end="url(#cp-amber)"/>
  <path d="M576,176 L666,214" fill="none" stroke="#a99f92" stroke-width="1.2" marker-end="url(#cp-grey)"/>

  <circle cx="670" cy="124" r="5" fill="#ded5c7"/>
  <text x="684" y="128" text-anchor="start" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="9.5" fill="#a99f92">descartado</text>
  <circle cx="670" cy="170" r="5.5" fill="#b25a24"/>
  <text x="684" y="174" text-anchor="start" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="10" fill="#3a352f">cambio viable</text>
  <circle cx="670" cy="216" r="5" fill="#ded5c7"/>
  <text x="684" y="220" text-anchor="start" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="9.5" fill="#a99f92">descartado</text>

  <!-- central contrast -->
  <text x="541" y="270" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="21"><tspan fill="#b25a24" font-weight="700">gatilla</tspan><tspan fill="#3a352f" dx="12">≠</tspan><tspan fill="#a99f92" dx="12">especifica</tspan></text>
  <text x="541" y="291" text-anchor="middle" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="9.5" fill="#8a8178">la perturbación dispara el cambio; la estructura decide cuál</text>

  <!-- bottom caption -->
  <line x1="40" y1="384" x2="780" y2="384" stroke="#ece3d5" stroke-width="1"/>
  <text x="410" y="406" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="11.5" font-style="italic" fill="#514b43">la demanda perturba; presupuestos y geometría deciden el cambio viable</text>
</svg>
